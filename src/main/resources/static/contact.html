<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tech University | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">GlobalTech Univ</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="nav-auth" id="nav-auth"></div>
    </nav>

    <header class="page-header">
        <h1>Contact Us</h1>
    </header>

    <section class="content-section">
        <div class="container flex-row">
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p><strong>Address:</strong> 123 University Avenue, Tech City, TX 75001</p>
                <p><strong>Email:</strong> admissions@globaltech.edu</p>
                <p><strong>Phone:</strong> +1 (800) 123-4567</p>
            </div>
            <div class="contact-form-container">
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Chatbot Container -->
    <div id="chatbot-wrapper"></div>

    <script src="js/script.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
